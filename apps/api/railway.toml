[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Override Railway dashboard / Railpack npm autodetect (monorepo root has package.json).
# Must match apps/api/Dockerfile CMD — Python API, not Next.js.
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
